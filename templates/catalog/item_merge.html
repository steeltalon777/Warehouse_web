{% extends "base.html" %}

{% block title %}Слияние ТМЦ{% endblock %}

{% block content %}
<div class="card">
    <h1>Слияние ТМЦ</h1>
    <form method="post" class="workspace-filters">
        {% csrf_token %}
        <div class="form-row">
            <label>Source ТМЦ</label>
            <select name="source_item_id" required>
                <option value="">Выберите</option>
                {% for item in items %}<option value="{{ item.id }}" {% if source_item_id == item.id|stringformat:"s" %}selected{% endif %}>{{ item.name }} ({{ item.sku|default:"—" }})</option>{% endfor %}
            </select>
        </div>
        <div class="form-row">
            <label>Target ТМЦ</label>
            <select name="target_item_id" required>
                <option value="">Выберите</option>
                {% for item in items %}<option value="{{ item.id }}" {% if target_item_id == item.id|stringformat:"s" %}selected{% endif %}>{{ item.name }} ({{ item.sku|default:"—" }})</option>{% endfor %}
            </select>
        </div>
        <div class="form-row">
            <label>Комментарий</label>
            <input type="text" name="comment" placeholder="Причина слияния" />
        </div>
        <div class="form-row workspace-filter-actions">
            <button type="submit">Выполнить слияние</button>
            <a href="{% url 'nomenclature:item_list' %}" class="btn btn-secondary">Назад</a>
        </div>
    </form>
</div>
{% endblock %}
