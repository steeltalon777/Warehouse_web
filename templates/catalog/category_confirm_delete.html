{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
    <div class="workspace-page-header">
        <div>
            <h1>{{ page_title }}</h1>
            <p class="catalog-page-note">{{ page_note }}</p>
        </div>
    </div>

    <div class="card catalog-form-card">
        <form method="post" data-loading-form data-loading-scope="page" data-loading-overlay-text="Деактивация категории...">
            {% csrf_token %}
            <div class="catalog-actions">
                <button type="submit" data-loading-text="Деактивация...">Да, деактивировать</button>
                <a href="{{ back_url }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
{% endblock %}
