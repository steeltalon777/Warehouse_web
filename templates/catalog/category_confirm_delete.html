{% extends "base.html" %}

{% block title %}Деактивировать категорию{% endblock %}

{% block content %}
    <h2>Деактивировать категорию</h2>

    <p>Категория будет отключена в SyncServer.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, деактивировать</button>
        <a href="{% url 'catalog:category_list' %}">Отмена</a>
    </form>
{% endblock %}
