{% extends "base.html" %}

{% block title %}Деактивировать категорию{% endblock %}

{% block content %}
    <h2>Деактивировать категорию</h2>

    <p>Категория будет отключена в SyncServer.</p>

    <form method="post" data-loading-form data-loading-scope="page" data-loading-overlay-text="Деактивация категории...">
        {% csrf_token %}
        <button type="submit" data-loading-text="Деактивация...">Да, деактивировать</button>
        <a href="{% url 'nomenclature:category_list' %}">Отмена</a>
    </form>
{% endblock %}
