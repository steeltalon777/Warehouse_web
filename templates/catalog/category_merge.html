{% extends "base.html" %}

{% block title %}Слияние категорий{% endblock %}

{% block content %}
<div class="card">
    <h1>Слияние категорий</h1>
    <form method="post" class="workspace-filters">
        {% csrf_token %}
        <div class="form-row">
            <label>Source категория</label>
            <select name="source_category_id" required>
                <option value="">Выберите</option>
                {% for category in categories %}<option value="{{ category.id }}" {% if source_category_id == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-row">
            <label>Target категория</label>
            <select name="target_category_id" required>
                <option value="">Выберите</option>
                {% for category in categories %}<option value="{{ category.id }}" {% if target_category_id == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-row">
            <label>Комментарий</label>
            <input type="text" name="comment" placeholder="Причина слияния" />
        </div>
        <div class="form-row workspace-filter-actions">
            <button type="submit">Выполнить слияние</button>
            <a href="{% url 'nomenclature:category_list' %}" class="btn btn-secondary">Назад</a>
        </div>
    </form>
</div>
{% endblock %}
