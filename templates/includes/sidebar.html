{% if user.is_authenticated %}

    <a href="{% url 'client:dashboard' %}">Главная</a>
    <a href="{% url 'catalog:home' %}">Каталог</a>
    <a href="{% url 'balances:list' %}">Остатки</a>
    <a href="{% url 'operations:list' %}">Операции</a>

    {% if user.is_superuser or user.sync_binding.sync_role == "chief_storekeeper" %}
        <a href="{% url 'nomenclature:home' %}">Номенклатура</a>
    {% endif %}

    {% if user.is_superuser %}
        <div class="section">Администрирование</div>

        <a href="{% url 'admin:index' %}">Django Admin</a>
        <a href="{% url 'admin_panel:devices' %}">Устройства</a>
        <a href="{% url 'admin_panel:access' %}">Доступы</a>

    {% endif %}

{% endif %}
